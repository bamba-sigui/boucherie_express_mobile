<!DOCTYPE html>
<html class="dark" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#38e07b",
                        "brand-red": "#C62828",
                        "background-dark": "#0a0f0c",
                        "card-dark": "#161d19",
                        "category-unselected": "#2a2a2a",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "1.5rem",
                        "xl": "2rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body { font-family: 'Public Sans', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark text-white min-h-screen flex flex-col">
<header class="sticky top-0 z-50 bg-background-dark/90 backdrop-blur-md px-5 py-4 flex items-center border-b border-white/5">
<h1 class="text-xl font-bold text-center w-full">Mes commandes</h1>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-8 text-center pb-32">
<div class="relative mb-8">
<div class="size-48 bg-card-dark rounded-full flex items-center justify-center border border-white/5 shadow-2xl">
<span class="material-symbols-outlined text-slate-700 text-[100px] leading-none">shopping_bag</span>
</div>
<div class="absolute -bottom-2 -right-2 size-14 bg-brand-red rounded-full flex items-center justify-center border-4 border-background-dark">
<span class="material-symbols-outlined text-white text-2xl">history_toggle_off</span>
</div>
</div>
<h2 class="text-2xl font-bold mb-3">Historique vide</h2>
<p class="text-slate-400 text-base mb-10 leading-relaxed max-w-[280px]">
            Vous n’avez encore passé aucune commande chez Boucherie Express.
        </p>
<button class="w-full max-w-xs bg-brand-red hover:bg-red-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-brand-red/20 transition-all flex items-center justify-center gap-2">
            Commander maintenant
        </button>
</main>
<nav class="fixed bottom-0 left-0 right-0 bg-background-dark/95 backdrop-blur-xl border-t border-white/5 px-2 pb-8 pt-3 flex items-center justify-around z-50">
<button class="flex flex-col items-center gap-1 text-slate-500 w-16">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium">Accueil</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-500 w-16">
<span class="material-symbols-outlined">favorite</span>
<span class="text-[10px] font-medium">Favoris</span>
</button>
<div class="relative -top-8">
<button class="size-16 rounded-full bg-primary text-background-dark shadow-[0_0_20px_rgba(56,224,123,0.3)] flex flex-col items-center justify-center border-4 border-background-dark">
<span class="material-symbols-outlined text-2xl font-bold">tune</span>
<span class="text-[9px] font-black uppercase">Filtrer</span>
</button>
</div>
<button class="flex flex-col items-center gap-1 text-primary w-16">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">receipt_long</span>
<span class="text-[10px] font-bold">Commandes</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-500 w-16">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-medium">Profil</span>
</button>
</nav>

</body></html>
