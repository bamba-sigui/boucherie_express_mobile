<!DOCTYPE html>
<html class="dark" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#38e07b",
                        "brand-red": "#C62828",
                        "background-dark": "#0a0f0c",
                        "card-dark": "#161d19",
                        "category-unselected": "#2a2a2a",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "1.5rem",
                        "xl": "2rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body { font-family: 'Public Sans', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input:focus { outline: none; ring: 0; }
    </style>
<style>
        body {
            min-height: 100dvh;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark text-white min-h-screen flex flex-col">
<header class="px-5 py-6 flex items-center justify-between">
<button class="size-10 rounded-full bg-card-dark flex items-center justify-center border border-white/5">
<span class="material-symbols-outlined text-white">arrow_back_ios_new</span>
</button>
<h1 class="text-sm font-black tracking-tighter text-white uppercase">BOUCHERIE <span class="text-primary">EXPRESS</span></h1>
<div class="size-10"></div> 
</header>
<main class="flex-1 px-6 pt-4 pb-12 flex flex-col">
<div class="mb-10 text-center">
<div class="size-20 bg-primary/10 rounded-full flex items-center justify-center mx-auto mb-6 border border-primary/20">
<span class="material-symbols-outlined text-primary text-4xl">person_add</span>
</div>
<h2 class="text-3xl font-bold mb-2">Complétez votre profil</h2>
<p class="text-slate-400">Dites-nous en plus sur vous pour commencer votre expérience.</p>
</div>
<div class="space-y-6 flex-1">
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-slate-500 ml-1">Nom complet</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">person</span>
<input class="w-full bg-card-dark border border-white/5 rounded-xl py-4 pl-12 pr-4 text-white placeholder:text-slate-600 focus:border-primary/50 focus:ring-0 transition-colors" placeholder="Ex: Jean-Marc Kouassi" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-slate-500 ml-1">Numéro de téléphone</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">call</span>
<input class="w-full bg-card-dark/50 border border-white/5 rounded-xl py-4 pl-12 pr-4 text-slate-400 cursor-not-allowed opacity-80" readonly="" type="text" value="+225 07 08 09 10 11"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-600 text-sm">lock</span>
</div>
<p class="text-[11px] text-slate-600 ml-1 italic">Le numéro de téléphone est vérifié et ne peut pas être modifié.</p>
</div>
</div>
<div class="mt-auto pt-8">
<button class="w-full bg-primary text-background-dark font-black py-5 rounded-xl text-lg shadow-[0_8px_30px_rgb(56,224,123,0.2)] active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                Terminer
                <span class="material-symbols-outlined font-bold">check_circle</span>
</button>
<p class="text-center text-slate-600 text-xs mt-6 px-6 leading-relaxed">
                En continuant, vous acceptez nos <span class="text-slate-400 underline">Conditions d'Utilisation</span> et notre <span class="text-slate-400 underline">Politique de Confidentialité</span>.
            </p>
</div>
</main>
<div class="h-8"></div>

</body></html>
